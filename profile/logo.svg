<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" aria-label="ZeroZero Software">
  <defs>
    <radialGradient id="p-bg" cx="50%" cy="35%" r="85%">
      <stop offset="0" stop-color="#15263a"/><stop offset="100%" stop-color="#0a0f17"/>
    </radialGradient>
    <linearGradient id="p-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#27e0c8"/><stop offset="100%" stop-color="#11a9d6"/>
    </linearGradient>
    <linearGradient id="p-r" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7b8cff"/><stop offset="100%" stop-color="#3f5be0"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#p-bg)"/>
  <!-- [ 0 ] : the programmer's slashed zero -->
